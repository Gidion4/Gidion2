<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIDION</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #00d4ff;
    --primary-dim: #0088aa;
    --accent: #00ff88;
    --warning: #ff6b35;
    --bg-deep: #020810;
    --bg-panel: rgba(0, 20, 40, 0.85);
    --border: rgba(0, 212, 255, 0.15);
    --border-active: rgba(0, 212, 255, 0.4);
    --text: #c8dce8;
    --text-bright: #e8f4ff;
    --glow: 0 0 20px rgba(0, 212, 255, 0.3);
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }

  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      transparent 50%,
      rgba(0, 212, 255, 0.015) 50%
    );
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 1000;
  }

  header {
    padding: 12px 24px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-active);
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 10;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--primary);
    text-shadow: var(--glow);
    letter-spacing: 4px;
  }

  .logo-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 4px;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 10px var(--accent);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  #status-bar {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 11px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-item {
    color: var(--primary-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .status-item .val {
    color: var(--primary);
  }

  .status-online {
    color: var(--accent);
  }

  /* Main content area */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
    z-index: 5;
  }

  /* Sidebar */
  #sidebar {
    width: 220px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(10px);
  }

  .sidebar-section {
    padding: 8px 16px;
    margin-bottom: 8px;
  }

  .sidebar-title {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary-dim);
    margin-bottom: 8px;
  }

  .sidebar-item {
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-item:hover {
    background: rgba(0, 212, 255, 0.05);
    border-left-color: var(--primary);
    color: var(--text-bright);
  }

  .sidebar-item.active {
    background: rgba(0, 212, 255, 0.1);
    border-left-color: var(--primary);
    color: var(--primary);
  }

  /* Chat area */
  #chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--primary-dim); border-radius: 2px; }

  .msg {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 4px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14px;
    position: relative;
    animation: msgIn 0.3s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid var(--border-active);
    color: var(--text-bright);
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg.assistant::before {
    content: 'GIDION';
    position: absolute;
    top: -8px;
    left: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--primary-dim);
    background: var(--bg-deep);
    padding: 0 6px;
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--primary-dim);
    font-size: 11px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
    border: none;
    padding: 8px;
  }

  /* Input area */
  #input-area {
    padding: 16px 24px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    backdrop-filter: blur(10px);
  }

  #input {
    flex: 1;
    padding: 14px 18px;
    background: rgba(0, 20, 40, 0.6);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-bright);
    font-size: 14px;
    font-family: 'Rajdhani', sans-serif;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  #input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
  }

  #input::placeholder {
    color: var(--primary-dim);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }

  #send {
    padding: 14px 28px;
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Orbitron', monospace;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  #send:hover {
    background: rgba(0, 212, 255, 0.1);
    box-shadow: var(--glow);
  }

  #send:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .typing {
    opacity: 0.5;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.2; }
  }

  code {
    background: rgba(0, 212, 255, 0.1);
    padding: 2px 6px;
    border-radius: 2px;
    font-size: 13px;
    color: var(--accent);
    font-family: 'Courier New', monospace;
  }

  pre {
    background: rgba(0, 8, 16, 0.8);
    padding: 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow-x: auto;
    margin: 8px 0;
  }

  pre code {
    background: none;
    padding: 0;
    color: var(--text);
  }

  /* Corner decorations */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 100;
    pointer-events: none;
  }
  .corner-tl { top: 0; left: 0; border-top: 2px solid var(--primary-dim); border-left: 2px solid var(--primary-dim); }
  .corner-tr { top: 0; right: 0; border-top: 2px solid var(--primary-dim); border-right: 2px solid var(--primary-dim); }
  .corner-bl { bottom: 0; left: 0; border-bottom: 2px solid var(--primary-dim); border-left: 2px solid var(--primary-dim); }
  .corner-br { bottom: 0; right: 0; border-bottom: 2px solid var(--primary-dim); border-right: 2px solid var(--primary-dim); }

  @media (max-width: 768px) {
    #sidebar { display: none; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<header>
  <span class="logo">GIDION<span class="logo-dot"></span></span>
  <div id="status-bar">
    <span class="status-item">SYS <span class="val status-online" id="sys-status">●</span></span>
    <span class="status-item">MODE <span class="val" id="mode-val">—</span></span>
    <span class="status-item">MODULES <span class="val" id="mod-count">—</span></span>
    <span class="status-item">TOOLS <span class="val" id="tool-count">—</span></span>
    <span class="status-item">AGENTS <span class="val" id="agent-count">—</span></span>
  </div>
</header>

<div id="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Navigation</div>
      <div class="sidebar-item active" data-view="chat">⚡ Chat</div>
      <div class="sidebar-item" data-view="modules">🧩 Modules</div>
      <div class="sidebar-item" data-view="agents">🤖 Agents</div>
      <div class="sidebar-item" data-view="tools">🔧 Tools</div>
      <div class="sidebar-item" data-view="memory">🧠 Memory</div>
    </div>
    <div class="sidebar-section" id="modules-list">
      <div class="sidebar-title">Active Modules</div>
    </div>
  </div>

  <div id="chat-container">
    <div id="chat"></div>
    <div id="input-area">
      <textarea id="input" placeholder="ENTER COMMAND..." rows="1"></textarea>
      <button id="send">SEND</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

async function checkStatus() {
  try {
    const res = await fetch(`${API}/status`);
    const data = await res.json();
    document.getElementById('mode-val').textContent = data.mode.toUpperCase();
    document.getElementById('mod-count').textContent = data.modules.length;
    document.getElementById('tool-count').textContent = data.tools.length;
    document.getElementById('agent-count').textContent = data.agents.length;
    document.getElementById('sys-status').textContent = '● ONLINE';
    document.getElementById('sys-status').classList.add('status-online');

    // Populate sidebar modules
    const modList = document.getElementById('modules-list');
    data.modules.forEach(m => {
      const div = document.createElement('div');
      div.className = 'sidebar-item';
      div.textContent = m;
      modList.appendChild(div);
    });

    addMsg('system', `GIDION v${data.version} // ${data.modules.length} MODULES // ${data.tools.length} TOOLS // ${data.agents.length} AGENTS // SYSTEM ONLINE`);
  } catch {
    document.getElementById('sys-status').textContent = '● OFFLINE';
    document.getElementById('sys-status').style.color = '#ff4444';
    addMsg('system', 'SYSTEM OFFLINE — Cannot reach Gidion API');
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);

  sendBtn.disabled = true;
  const typing = addMsg('assistant', 'PROCESSING...');
  typing.classList.add('typing');

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    typing.textContent = data.response || data.error || 'No response';
    typing.classList.remove('typing');
  } catch (err) {
    typing.textContent = `ERROR: ${err.message}`;
    typing.classList.remove('typing');
  }

  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Sidebar navigation
document.querySelectorAll('.sidebar-item[data-view]').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-item[data-view]').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  });
});

checkStatus();
</script>
</body>
</html>
